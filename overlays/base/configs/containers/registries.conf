# Container image registries configuration
# Deployed to /etc/containers/registries.conf via overlay

# Search order for unqualified image names (e.g. "podman pull nginx")
[registries.search]
registries = ['docker.io', 'ghcr.io', 'quay.io', 'registry.access.redhat.com']

# Registries that allow HTTP (insecure) connections — none by default
[registries.insecure]
registries = []

# Blocked registries — none by default
[registries.block]
registries = []

[[registry]]
location = "docker.io"

[[registry]]
location = "quay.io"
