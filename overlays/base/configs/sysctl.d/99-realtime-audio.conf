# Kernel tuning for real-time audio production
# Reduces latency and prevents xruns under load

# Allow unprivileged users to use RT scheduling via rlimits
vm.swappiness = 10

# Increase max user watches for large DAW projects with many files
fs.inotify.max_user_watches = 524288

# Timer frequency / scheduling granularity — reduce wakeup overhead
kernel.sched_rt_runtime_us = -1
