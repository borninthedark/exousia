# Packages to Remove
# These removals are image-wide defaults, independent of a selected window manager.

apiVersion: exousia.packages/v1alpha1
kind: PackageRemovalBundle

metadata:
  name: remove
  type: common
  description: Default package removals from the base image

spec:
  stage: build
  packages:
    - firefox
    - firefox-langpacks
    - sddm
