# Compatibility shim for the historical base bundle name.
# The resolver expands `base` into the default common bundle set:
# base-core, base-media, base-devtools, base-virtualization,
# base-security, base-network, and base-shell.

apiVersion: exousia.packages/v1alpha1
kind: PackageBundle

metadata:
  name: base
  type: common
  description: Compatibility alias for the default common bundle set

spec:
  source: rpm
  stage: build
  packages: []
  conflicts:
    packages: []
    features: []
  requires:
    features: []
