# Audio Production Packages (Fedora Jam)
# Provides the full professional audio stack: PipeWire/JACK bridge,
# DAWs, plugins, and real-time scheduling tools.

apiVersion: exousia.packages/v1alpha1
kind: FeatureBundle

metadata:
  name: feature-audio-production
  type: common
  description: Fedora Jam audio production suite with PipeWire/JACK and RT tuning

spec:
  source: rpm
  stage: build
  packages:
    - pipewire-jack-audio-connection-kit
    - pipewire-plugin-libcamera
    - realtime-setup
    - tuned
    - tuned-profiles-realtime
    - ardour
    - lmms
    - rosegarden
    - qtractor
    - hydrogen
    - audacity
    - musescore
    - yoshimi
    - zynaddsubfx
    - fluidsynth
    - qsynth
    - soundfont-fluid
    - lsp-plugins
    - calf
    - lv2-avw-plugins
    - lv2-invada-plugins
    - lv2-swh-plugins
    - lv2-zynadd-plugins
    - dssi
    - vmpk
    - a2jmidid
    - jack_capture
    - jaaa
    - japa
    - qjackctl
    - carla
    - raysession
  conflicts:
    packages: []
    features: []
  requires:
    features: []
