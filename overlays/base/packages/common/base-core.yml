apiVersion: exousia.packages/v1alpha1
kind: PackageBundle

metadata:
  name: base-core
  type: common
  description: Core packages for all Exousia builds

spec:
  source: rpm
  stage: build
  packages:
    - neovim
    - name: flatpak >= 1.16.6
    - rtkit
    - gnome-disk-utility
    - cargo
    - git
    - htop
    - etckeeper
    - fastfetch
    - podman-compose
    - glances
    - kubectl
    - k3s
    - curl
    - iptables-nft
    - container-selinux
    - policycoreutils-python-utils
    - cryptsetup
    - python3
    - uv
    - chezmoi
  conflicts:
    packages: []
    features: []
  requires:
    features: []
