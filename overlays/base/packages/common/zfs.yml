apiVersion: exousia.packages/v1alpha1
kind: FeatureBundle

metadata:
  name: feature-zfs
  type: common
  description: OpenZFS kernel modules and userspace tools built via DKMS

spec:
  source: rpm
  stage: build
  packages:
    - zfs
    - kernel-devel
    - kernel-headers
    - dkms
    - gcc
    - make
    - autoconf
    - automake
    - libtool
    - libuuid-devel
    - libblkid-devel
    - openssl-devel
    - zlib-devel
    - libtirpc-devel
    - elfutils-libelf-devel
  conflicts:
    packages: []
    features: []
  requires:
    features: []
