# Sway Window Manager Package Definition
# This defines all packages needed for a Sway desktop environment.

apiVersion: exousia.packages/v1alpha1
kind: PackageBundle

metadata:
  name: wm-sway
  type: window-manager
  description: Tiling Wayland compositor and i3 replacement
  homepage: https://swaywm.org/

spec:
  source: rpm
  stage: build
  packages:
    - sway
    - swaylock
    - swayidle
    - swaybg
    - waybar
    - kitty
    - fuzzel
    - mako
    - swaync
    - greetd
    - tuigreet
    - wlroots
    - xorg-x11-server-Xwayland
    - seatd
    - lxqt-policykit
    - xdg-utils
    - xdg-user-dirs
    - xdg-dbus-proxy
    - flatpak-xdg-utils
    - xdg-desktop-portal
    - xdg-desktop-portal-wlr
    - xdg-desktop-portal-lxqt
    - pipewire
    - pipewire-alsa
    - pipewire-pulseaudio
    - pipewire-utils
    - wireplumber
    - pavucontrol
    - pamixer
    - playerctl
    - mesa-dri-drivers
    - mesa-vulkan-drivers
    - google-noto-sans-fonts
    - google-noto-serif-fonts
    - dejavu-sans-fonts
    - dejavu-sans-mono-fonts
    - liberation-fonts-all
    - thunar
    - thunar-archive-plugin
    - thunar-volman
    - gvfs
    - gvfs-mtp
    - gvfs-gphoto2
    - imv
    - zathura
    - zathura-pdf-mupdf
    - grim
    - slurp
    - swappy
    - brightnessctl
    - network-manager-applet
    - nm-connection-editor
    - wlogout
    - bluez-tools
    - blueman
    - tlp
    - powertop
    - adwaita-icon-theme
    - adwaita-gtk2-theme
    - gnome-themes-extra
    - qt6ct
    - nwg-look
    - python3-i3ipc
    - wl-clipboard
    - cliphist
    - wev
    - kanshi
    - wlsunset
    - wob
    - jq
    - curl
    - ImageMagick
    - plymouth
    - plymouth-system-theme
    - plymouth-plugin-two-step
  conflicts:
    packages:
      - foot
      - dunst
      - rofi
      - rofi-wayland
    features: []
  replaces:
    - foot
    - dunst
    - rofi
    - rofi-wayland
  requires:
    features: []
