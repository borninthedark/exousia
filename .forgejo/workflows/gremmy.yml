# Gremmy Thoumeaux — Sternritter V "The Visionary"
# Forgejo Build: transpile blueprint, build image with buildah, push to local
# registry at localhost:5000. Runs after Bambietta (CI) + Askin (Security) pass.
# Forgejo-local parity with Hiyori (GitHub Actions).

name: "Gremmy — Build & Push"

on:
  workflow_call:
    inputs:
      image_type:
        description: "Image type to build"
        type: string
        default: "fedora-sway-atomic"
      distro_version:
        description: "Fedora version"
        type: string
        required: true
      enable_plymouth:
        description: "Enable Plymouth boot splash"
        type: boolean
        default: true

env:
  LOCAL_REGISTRY: localhost:5000
  IMAGE_NAME: exousia

jobs:
  build:
    name: Build (${{ inputs.distro_version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Transpile YAML blueprint
        id: transpile
        run: |
          PLYMOUTH_FLAG="--enable-plymouth"
          if [ "${{ inputs.enable_plymouth }}" = "false" ]; then
            PLYMOUTH_FLAG="--disable-plymouth"
          fi

          mkdir -p build
          uv run python -m generator \
            --config adnyeus.yml \
            --output Dockerfile.generated \
            --resolved-package-plan build/resolved-build-plan.json \
            --image-type "${{ inputs.image_type }}" \
            --fedora-version "${{ inputs.distro_version }}" \
            $PLYMOUTH_FLAG \
            --verbose

      - name: Build image with buildah
        id: build
        run: |
          FVER="f${{ inputs.distro_version }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TAG="${{ inputs.image_type }}-${FVER}-${SHORT_SHA}"

          buildah bud \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:${FVER}" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:dev" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:latest" \
            -f Dockerfile.generated .

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "fver=${FVER}" >> $GITHUB_OUTPUT

      - name: Push to local registry
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          FVER="${{ steps.build.outputs.fver }}"

          skopeo copy \
            "containers-storage:${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}" \
            "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}" \
            --dest-tls-verify=false

          skopeo copy \
            "containers-storage:${LOCAL_REGISTRY}/${IMAGE_NAME}:${FVER}" \
            "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:${FVER}" \
            --dest-tls-verify=false

          skopeo copy \
            "containers-storage:${LOCAL_REGISTRY}/${IMAGE_NAME}:dev" \
            "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:dev" \
            --dest-tls-verify=false

          skopeo copy \
            "containers-storage:${LOCAL_REGISTRY}/${IMAGE_NAME}:latest" \
            "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:latest" \
            --dest-tls-verify=false

      - name: Build summary
        if: always()
        run: |
          echo "## Gremmy: Build Results (Fedora ${{ inputs.distro_version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${LOCAL_REGISTRY}/${IMAGE_NAME}:${{ steps.build.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ inputs.image_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fedora | ${{ inputs.distro_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plymouth | ${{ inputs.enable_plymouth }} |" >> $GITHUB_STEP_SUMMARY
