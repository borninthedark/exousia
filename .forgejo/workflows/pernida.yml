# Pernida Parnkjas — Sternritter C "The Compulsory"
# Forgejo Orchestrator: local build + push to remotes.
#
# Job containers: 2 CPUs, 8GB RAM × 3 parallel (see docs/forgejo-runner.md)
#
# All jobs are inlined (not workflow_call) to avoid Forgejo's label
# dispatch bug where called workflow jobs get empty runner labels.
#
# Flow (uryu/* branches only):
#   Bambietta + Askin (parallel) -> Gremmy (build + push :local/:latest to registry)
#   -> Jugram pushes branch to GitHub (triggers Urahara on GitHub side)
#
# Vandenreich Pipeline:
#   Pernida    -> Orchestrator (this file — all jobs inlined)
#   Bambietta  -> CI: lint + test
#   Askin      -> Security scanning
#   Gremmy     -> Build & push to local registry
#   Lille      -> Integration test + policy gate
#   Jugram     -> Summary + promotion to GitHub/Codeberg
#
# Requires GHCR_PAT and CODEBERG_TOKEN in Forgejo Actions secrets.

name: "Pernida — Orchestrator"

on:
  workflow_dispatch:
  schedule:
    - cron: "30 15 * * *"  # daily 11:30 ET (15:30 UTC), after base image mirror at 07:30
  push:
    branches: ["uryu/*"]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "*.md"
      - "LICENSE"
      - ".pre-commit-config.yaml"
      - "tools/generate-readme.py"
      - "tools/test_*.py"

env:
  LOCAL_REGISTRY: registry:5000
  IMAGE_NAME: exousia


jobs:
  # -- Resolve Defaults --
  defaults:
    name: "Resolve Defaults"
    runs-on: ubuntu-latest
    outputs:
      primary_version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: adnyeus.yml
          sparse-checkout-cone-mode: false

      - name: Read image-version from blueprint
        id: read
        run: |
          VERSION=$(grep '^image-version:' adnyeus.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Blueprint primary version: ${VERSION}"

  # -- Bambietta (CI): lint + test --
  bambietta:
    name: "Bambietta (CI)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff
        run: uv run ruff check tools/

      - name: Black (check)
        run: uv run black --check tools/

      - name: isort (check)
        run: uv run isort --check-only tools/

      - name: Pytest with coverage
        run: |
          uv run pytest tools/ -v --tb=short \
            --cov=tools --cov-branch \
            --cov-report=term \
            --junitxml=junit.xml

      - name: Test summary
        if: always()
        run: |
          echo "## Bambietta: CI Results" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff: passed" >> $GITHUB_STEP_SUMMARY
          echo "- Black: passed" >> $GITHUB_STEP_SUMMARY
          echo "- isort: passed" >> $GITHUB_STEP_SUMMARY
          echo "- Pytest: see coverage report" >> $GITHUB_STEP_SUMMARY

  # -- Askin (Security): scanning --
  askin:
    name: "Askin (Security)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --dev

      - name: Install Bats
        run: |
          apt-get update -qq
          apt-get install -y -qq bats

      - name: Install bats-support and bats-assert
        run: |
          mkdir -p /usr/lib/bats
          git clone --depth 1 https://github.com/bats-core/bats-support /usr/lib/bats/bats-support
          git clone --depth 1 https://github.com/bats-core/bats-assert /usr/lib/bats/bats-assert
          git clone --depth 1 https://github.com/bats-core/bats-file /usr/lib/bats/bats-file

      - name: Verify required file structure
        run: |
          echo "## Askin: File Structure Check" >> $GITHUB_STEP_SUMMARY

          for file in sway.desktop start-sway; do
            if [[ ! -f "overlays/sway/session/$file" ]]; then
              echo "ERROR: Missing overlays/sway/session/$file"
              exit 1
            fi
          done

          if [[ ! -f "overlays/sway/configs/greetd/config.toml" ]]; then
            echo "ERROR: Missing overlays/sway/configs/greetd/config.toml"
            exit 1
          fi

          for dir in window-managers common; do
            if [[ ! -d "overlays/base/packages/$dir" ]]; then
              echo "ERROR: Missing overlays/base/packages/$dir directory"
              exit 1
            fi
          done

          for script in setup-plymouth-theme dracut-rebuild ensure-sway-session; do
            if [[ ! -f "overlays/sway/scripts/setup/$script" ]]; then
              echo "ERROR: Missing overlays/sway/scripts/setup/$script"
              exit 1
            fi
          done

          for script in layered-include volume-helper; do
            if [[ ! -f "overlays/sway/scripts/runtime/$script" ]]; then
              echo "ERROR: Missing overlays/sway/scripts/runtime/$script"
              exit 1
            fi
          done

          echo "All required files present" >> $GITHUB_STEP_SUMMARY

      - name: Run overlay Bats tests
        env:
          BATS_LIB_PATH: /usr/lib/bats
          TERM: xterm
        run: bats tests/overlay_content.bats

      - name: Transpile YAML blueprint
        run: |
          mkdir -p build
          uv run python -m generator \
            --config adnyeus.yml \
            --output Dockerfile.generated \
            --resolved-package-plan build/resolved-build-plan.json \
            --image-type fedora-sway-atomic \
            --enable-plymouth \
            --verbose

      - name: Install Hadolint
        run: |
          curl -fsSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Hadolint
        run: hadolint --ignore DL3041 --ignore DL3059 --ignore DL4006 --ignore SC3040 Dockerfile.generated

      - name: Install Checkov
        run: uv tool install checkov

      - name: Checkov (Containerfile)
        run: |
          checkov -f Dockerfile.generated \
            --framework dockerfile \
            --quiet \
            --soft-fail \
            --skip-check CKV_DOCKER_2,CKV_DOCKER_3

      - name: Install Trivy (latest, checksum-verified)
        run: |
          TRIVY_VERSION=$(curl -sL "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "Installing Trivy v${TRIVY_VERSION}"
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
          EXPECTED=$(grep "Linux-64bit.tar.gz" /tmp/trivy_checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/trivy.tar.gz | awk '{print $1}')
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "::error::Trivy checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Trivy config scan
        run: |
          trivy config --severity HIGH,CRITICAL --exit-code 0 .

      - name: Bandit (Python SAST)
        run: uv run bandit -r tools/ -ll -c pyproject.toml

      - name: Install OSV-Scanner
        run: |
          set -euxo pipefail
          OSV_VERSION="2.3.6"
          OSV_SHA256="f689e183ef0d573d2459738aae457d411a26241ae58b5088de1af288b3355604"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          echo "${OSV_SHA256}  /usr/local/bin/osv-scanner" | sha256sum --check --strict
          chmod +x /usr/local/bin/osv-scanner

      - name: OSV-Scanner
        run: |
          set -euxo pipefail
          osv-scanner scan source --recursive ./

      - name: Security summary
        if: always()
        run: |
          echo "## Askin: Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hadolint | Containerfile |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | Containerfile |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Repository config |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | Python tools/ |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV-Scanner | Dependencies |" >> $GITHUB_STEP_SUMMARY

  # -- Gremmy (Build): after Bambietta + Askin pass --
  gremmy:
    name: "Gremmy (Build)"
    needs: [defaults, bambietta, askin]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Install build tools
        run: |
          apt-get update -qq
          apt-get install -y -qq buildah skopeo

      - name: Authenticate to GHCR (for RPM override images)
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          echo "${GHCR_PAT}" | buildah login ghcr.io -u borninthedark --password-stdin

      - name: Transpile YAML blueprint
        id: transpile
        run: |
          mkdir -p build
          uv run python -m generator \
            --config adnyeus.yml \
            --output Dockerfile.generated \
            --resolved-package-plan build/resolved-build-plan.json \
            --image-type fedora-sway-atomic \
            --fedora-version "${{ needs.defaults.outputs.primary_version }}" \
            --enable-plymouth \
            --verbose

      - name: Resolve base image source
        id: base
        run: |
          FVER="${{ needs.defaults.outputs.primary_version }}"
          UPSTREAM="quay.io/fedora/fedora-sway-atomic:${FVER}"
          LOCAL="registry:5000/fedora-sway-atomic:${FVER}"

          # Use local mirror if available, otherwise keep upstream
          if skopeo inspect --tls-verify=false "docker://${LOCAL}" >/dev/null 2>&1; then
            echo "Using local registry mirror"
            # Pin by digest for hermetic builds
            DIGEST=$(skopeo inspect --tls-verify=false "docker://${LOCAL}" | python3 -c "import sys,json; print(json.load(sys.stdin)['Digest'])")
            sed -i "s|FROM ${UPSTREAM}|FROM ${LOCAL}@${DIGEST}|" Dockerfile.generated
            echo "base=${LOCAL}@${DIGEST}" >> $GITHUB_OUTPUT
          else
            echo "Local mirror unavailable — using quay.io upstream"
            DIGEST=$(skopeo inspect "docker://${UPSTREAM}" | python3 -c "import sys,json; print(json.load(sys.stdin)['Digest'])")
            sed -i "s|FROM ${UPSTREAM}|FROM ${UPSTREAM}@${DIGEST}|" Dockerfile.generated
            echo "base=${UPSTREAM}@${DIGEST}" >> $GITHUB_OUTPUT
          fi

      - name: Build image with buildah
        id: build
        run: |
          FVER="f${{ needs.defaults.outputs.primary_version }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TAG="fedora-sway-atomic-${FVER}-${SHORT_SHA}"

          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          buildah bud --layers --tls-verify=false \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=${BUILD_DATE}" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.title=${IMAGE_NAME}" \
            --label "org.opencontainers.image.base.name=${{ steps.base.outputs.base }}" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:${FVER}" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:${VERSION}" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:local" \
            -t "${LOCAL_REGISTRY}/${IMAGE_NAME}:latest" \
            -f Dockerfile.generated .

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "fver=${FVER}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Push to local registry
        if: github.event_name != 'pull_request'
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          FVER="${{ steps.build.outputs.fver }}"
          VERSION="${{ steps.build.outputs.version }}"

          for IMAGE_TAG in "${TAG}" "${FVER}" "${VERSION}" "local" "latest"; do
            skopeo copy \
              "containers-storage:${LOCAL_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" \
              "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" \
              --dest-tls-verify=false
          done

      # -- Supply Chain: SBOM + Provenance --

      - name: Install Trivy (latest, checksum-verified)
        run: |
          TRIVY_VERSION=$(curl -sL "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "Installing Trivy v${TRIVY_VERSION}"
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
          EXPECTED=$(grep "Linux-64bit.tar.gz" /tmp/trivy_checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/trivy.tar.gz | awk '{print $1}')
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "::error::Trivy checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
            exit 1
          fi
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Generate SBOM (CycloneDX)
        id: sbom
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          trivy image --format cyclonedx --insecure \
            --scanners vuln --timeout 10m \
            -o sbom-cyclonedx.json \
            "${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "Generated SBOM: $(wc -c < sbom-cyclonedx.json) bytes"

      - name: Trivy scan built image
        id: trivy
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          trivy image --severity CRITICAL,HIGH --exit-code 1 --insecure \
            --scanners vuln --timeout 10m \
            --format json -o trivy-results.json \
            "${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}" || true

          CRITICAL=$(python3 -c "
          import json
          data = json.load(open('trivy-results.json'))
          count = sum(1 for r in data.get('Results', []) for v in r.get('Vulnerabilities', []) if v.get('Severity') == 'CRITICAL')
          print(count)
          " 2>/dev/null || echo "0")
          echo "critical_count=${CRITICAL}" >> $GITHUB_OUTPUT

      - name: Generate SLSA provenance
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          cat > provenance.json <<PROVEOF
          {
            "buildType": "https://forgejo.org/forgejo-actions/v1",
            "builder": {
              "id": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "invocation": {
              "configSource": {
                "uri": "${{ github.server_url }}/${{ github.repository }}",
                "digest": { "sha1": "${{ github.sha }}" },
                "entryPoint": ".forgejo/workflows/pernida.yml"
              },
              "parameters": {
                "image_name": "${IMAGE_NAME}",
                "image_tag": "${TAG}",
                "base_image": "${{ steps.base.outputs.base }}"
              }
            },
            "metadata": {
              "buildStartedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "completeness": {
                "parameters": true,
                "environment": false,
                "materials": true
              }
            },
            "materials": [
              {
                "uri": "${{ steps.base.outputs.base }}",
                "digest": { "sha256": "$(echo '${{ steps.base.outputs.base }}' | grep -oP 'sha256:\K.*' || echo 'unknown')" }
              }
            ]
          }
          PROVEOF

      - name: Attach SBOM + provenance to image
        if: github.event_name != 'pull_request'
        run: |
          TAG="${{ steps.build.outputs.tag }}"
          IMAGE="${LOCAL_REGISTRY}/${IMAGE_NAME}:${TAG}"

          # Push SBOM and provenance as separate OCI artifacts
          # (inline base64 annotations exceed ARG_MAX for large SBOMs)
          SBOM_TAG="${TAG}-sbom"
          PROV_TAG="${TAG}-provenance"

          # Create minimal OCI images carrying the attestation files
          CTR_SBOM=$(buildah from scratch)
          buildah copy "${CTR_SBOM}" sbom-cyclonedx.json /sbom-cyclonedx.json
          buildah config \
            --annotation "org.opencontainers.image.ref.name=${TAG}" \
            --annotation "org.opencontainers.image.description=CycloneDX SBOM" \
            "${CTR_SBOM}"
          buildah commit "${CTR_SBOM}" "${LOCAL_REGISTRY}/${IMAGE_NAME}:${SBOM_TAG}"
          buildah rm "${CTR_SBOM}"

          CTR_PROV=$(buildah from scratch)
          buildah copy "${CTR_PROV}" provenance.json /provenance.json
          buildah config \
            --annotation "org.opencontainers.image.ref.name=${TAG}" \
            --annotation "org.opencontainers.image.description=SLSA Provenance" \
            "${CTR_PROV}"
          buildah commit "${CTR_PROV}" "${LOCAL_REGISTRY}/${IMAGE_NAME}:${PROV_TAG}"
          buildah rm "${CTR_PROV}"

          # Add lightweight annotations pointing to the attestation tags
          CTR=$(buildah from --pull=false "${IMAGE}")
          buildah config \
            --annotation "org.opencontainers.image.sbom=${LOCAL_REGISTRY}/${IMAGE_NAME}:${SBOM_TAG}" \
            --annotation "org.opencontainers.image.provenance=${LOCAL_REGISTRY}/${IMAGE_NAME}:${PROV_TAG}" \
            "${CTR}"
          buildah commit "${CTR}" "${IMAGE}"
          buildah rm "${CTR}"

          # Push all three tags
          for T in "${TAG}" "${SBOM_TAG}" "${PROV_TAG}"; do
            skopeo copy \
              "containers-storage:${LOCAL_REGISTRY}/${IMAGE_NAME}:${T}" \
              "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:${T}" \
              --dest-tls-verify=false
          done

      - name: Build summary
        if: always()
        run: |
          echo "## Gremmy: Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${LOCAL_REGISTRY}/${IMAGE_NAME}:${{ steps.build.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | fedora-sway-atomic |" >> $GITHUB_STEP_SUMMARY
          echo "| Fedora | ${{ needs.defaults.outputs.primary_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Base (pinned) | \`${{ steps.base.outputs.base }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | CycloneDX ($(wc -c < sbom-cyclonedx.json 2>/dev/null || echo 0) bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| Provenance | SLSA v1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical CVEs | ${{ steps.trivy.outputs.critical_count }} |" >> $GITHUB_STEP_SUMMARY

  # -- Lille (X — The X-Axis): integration test + policy gate --
  lille:
    name: "Lille (Verify)"
    needs: [defaults, gremmy]
    if: needs.gremmy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y -qq skopeo
          TRIVY_VERSION=$(curl -sL "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
          EXPECTED=$(grep "Linux-64bit.tar.gz" /tmp/trivy_checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum /tmp/trivy.tar.gz | awk '{print $1}')
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "::error::Trivy checksum mismatch"
            exit 1
          fi
          tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy

      - name: Pull image for verification
        id: pull
        run: |
          FVER="f${{ needs.defaults.outputs.primary_version }}"
          skopeo inspect --tls-verify=false \
            "docker://${LOCAL_REGISTRY}/${IMAGE_NAME}:${FVER}" > /tmp/inspect.json || true
          DIGEST=$(python3 -c "import json; print(json.load(open('/tmp/inspect.json'))['Digest'])")
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Image digest: ${DIGEST}"

      - name: Policy check — no critical CVEs
        id: policy_cve
        run: |
          FVER="f${{ needs.defaults.outputs.primary_version }}"
          trivy image --severity CRITICAL --exit-code 0 --insecure \
            --scanners vuln --timeout 10m \
            --format json -o /tmp/trivy-critical.json \
            "${LOCAL_REGISTRY}/${IMAGE_NAME}:${FVER}"

          # CVEs allowlisted while waiting on upstream Fedora package updates.
          # Each entry must have a comment explaining why it's allowed.
          # Remove entries as soon as the fix lands in Fedora repos.
          ALLOWLIST="
            CVE-2026-33186  # grpc-go authz bypass — in podman/buildah, fix needs grpc v1.79.3
          "

          CRITICAL=$(python3 -c "
          import json, sys
          allowlist = set(l.split('#')[0].strip() for l in '''${ALLOWLIST}'''.strip().splitlines() if l.split('#')[0].strip())
          data = json.load(open('/tmp/trivy-critical.json'))
          blocked = []
          allowed = []
          for r in data.get('Results', []):
              for v in r.get('Vulnerabilities', []):
                  if v.get('Severity') == 'CRITICAL':
                      cve = v['VulnerabilityID']
                      if cve in allowlist:
                          allowed.append(cve)
                      else:
                          blocked.append(cve)
          if allowed:
              print(f'Allowlisted: {len(allowed)} ({", ".join(sorted(set(allowed)))})', file=sys.stderr)
          print(len(blocked))
          " 2>&1)

          # Extract just the count (last line of output)
          BLOCKED=$(echo "${CRITICAL}" | tail -1)
          # Print advisory lines
          echo "${CRITICAL}" | head -n -1

          echo "critical=${BLOCKED}" >> $GITHUB_OUTPUT
          if [ "${BLOCKED}" -gt 0 ]; then
            echo "::error::${BLOCKED} critical CVE(s) found — blocking release"
            exit 1
          fi

      - name: Policy check — image metadata
        run: |
          # Verify image has expected labels/layers
          LAYERS=$(python3 -c "import json; print(len(json.load(open('/tmp/inspect.json')).get('Layers', [])))")
          echo "Image layers: ${LAYERS}"
          if [ "${LAYERS}" -lt 2 ]; then
            echo "::error::Image has fewer than 2 layers — build may be broken"
            exit 1
          fi

      - name: Verification summary
        if: always()
        run: |
          echo "## Verify: Integration Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image exists in registry | ${{ steps.pull.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical CVEs | ${{ steps.policy_cve.outputs.critical }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image metadata valid | passed |" >> $GITHUB_STEP_SUMMARY

  # -- Jugram (B — The Balance): summary + promotion --
  jugram:
    name: "Jugram (Gate)"
    needs: [bambietta, askin, gremmy, lille]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "## Pernida Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Sternritter | Role | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Bambietta (E) | CI: lint + test | ${{ needs.bambietta.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Askin (D) | Security scanning | ${{ needs.askin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gremmy (V) | Build & push | ${{ needs.gremmy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lille (X) | Integration + policy | ${{ needs.lille.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: >-
          needs.bambietta.result == 'failure' ||
          needs.askin.result == 'failure' ||
          needs.gremmy.result == 'failure' ||
          needs.lille.result == 'failure'
        run: exit 1

      - name: Push to remotes (GitHub + Codeberg)
        if: >-
          needs.bambietta.result == 'success' &&
          needs.askin.result == 'success' &&
          needs.gremmy.result == 'success' &&
          needs.lille.result == 'success'
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          git clone --bare --single-branch --branch "${BRANCH}" \
            "${{ github.server_url }}/${{ github.repository }}.git" /tmp/push-repo
          cd /tmp/push-repo

          # Push to GitHub (classic PAT)
          GITHUB_TOKEN=$(echo "${GHCR_PAT}" | tr -d '[:space:]')
          GITHUB_URL="https://borninthedark:${GITHUB_TOKEN}@github.com/borninthedark/exousia.git"
          git push "${GITHUB_URL}" "${BRANCH}:${BRANCH}" --force
          echo "Pushed ${BRANCH} to GitHub"

          # Push to Codeberg
          CODEBERG_URL="https://borninthedark:${CODEBERG_TOKEN}@codeberg.org/borninthedark/exousia.git"
          git push "${CODEBERG_URL}" "${BRANCH}:${BRANCH}" --force
          echo "Pushed ${BRANCH} to Codeberg"

      - name: Sync docs to Paperless
        if: >-
          needs.bambietta.result == 'success' &&
          needs.askin.result == 'success'
        env:
          PAPERLESS_TOKEN: ${{ secrets.PAPERLESS_TOKEN }}
        run: |
          git clone --single-branch --branch "${GITHUB_REF_NAME}" \
            "${{ github.server_url }}/${{ github.repository }}.git" /tmp/docs-repo
          cd /tmp/docs-repo

          API="http://paperless:8000/api"
          TAG_ID=1  # exousia
          AUTH="Authorization: Token ${PAPERLESS_TOKEN}"

          for doc in $(find docs/ -name '*.md' -type f); do
            TITLE="exousia/$(basename "${doc}" .md)"
            HASH=$(sha256sum "${doc}" | cut -d' ' -f1)

            # Check if document already exists by title
            EXISTING=$(curl -s -H "${AUTH}" \
              "${API}/documents/?title__iexact=${TITLE}&tags__id=${TAG_ID}" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', [])
          if results:
              doc = results[0]
              print(f'{doc[\"id\"]}|{doc.get(\"notes\", \"\")}')
          " 2>/dev/null || echo "")

            DOC_ID=$(echo "${EXISTING}" | cut -d'|' -f1)
            OLD_HASH=$(echo "${EXISTING}" | cut -d'|' -f2)

            if [ -n "${DOC_ID}" ] && [ "${OLD_HASH}" = "${HASH}" ]; then
              echo "Skipping ${doc} — unchanged (${HASH:0:12})"
              continue
            fi

            if [ -n "${DOC_ID}" ]; then
              echo "Updating ${doc} — content changed"
              curl -s -X DELETE -H "${AUTH}" "${API}/documents/${DOC_ID}/" || true
            else
              echo "Uploading ${doc} — new document"
            fi

            # Upload and store hash in notes for future diffing
            RESP=$(curl -s -X POST -H "${AUTH}" \
              -F "document=@${doc}" \
              -F "title=${TITLE}" \
              -F "tags=${TAG_ID}" \
              "${API}/documents/post_document/")
            NEW_ID=$(echo "${RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

            if [ -n "${NEW_ID}" ] && [ "${NEW_ID}" != "None" ]; then
              curl -s -X PATCH -H "${AUTH}" -H "Content-Type: application/json" \
                -d "{\"notes\": \"${HASH}\"}" \
                "${API}/documents/${NEW_ID}/" > /dev/null || true
            fi
          done
          echo "Doc sync complete"
