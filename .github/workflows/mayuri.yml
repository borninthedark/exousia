---
# Mayuri Kurotsuchi - 12th Division - R&D / Watcher
# Polls borninthedark/dotfiles for new commits; triggers the Urahara pipeline
# when changes are detected.
#
# 12th Division Pipeline:
#   Urahara  -> Orchestrator
#   Hikifune -> CI: lint + test
#   Uhin     -> Security scanning
#   Hiyori   -> Build, scan, sign, release
#   Nemu     -> Status report
#   Mayuri   -> Dotfiles watcher / R&D trigger

name: "Mayuri - Dotfiles Watcher"

on:
  schedule:
    - cron: "10 4,12,20 * * *"  # 04:10, 12:10, 20:10 UTC — midpoint between Urahara runs
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  watch-dotfiles:
    name: "Watch borninthedark/dotfiles"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Fetch latest dotfiles commit SHA
        id: dotfiles
        run: |
          LATEST_SHA=$(curl -sf \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/borninthedark/dotfiles/commits/main" \
            | jq -r '.sha')
          if [ -z "${LATEST_SHA}" ] || [ "${LATEST_SHA}" = "null" ]; then
            echo "ERROR: Failed to fetch dotfiles SHA" >&2
            exit 1
          fi
          echo "latest_sha=${LATEST_SHA}" >> "$GITHUB_OUTPUT"
          echo "Dotfiles HEAD: ${LATEST_SHA}"

      - name: Compare with last-seen SHA
        id: compare
        run: |
          LAST_SHA=$(cat .dotfiles-sha 2>/dev/null || echo "")
          LATEST_SHA="${{ steps.dotfiles.outputs.latest_sha }}"
          echo "Last seen: ${LAST_SHA:-<none>}"
          echo "Latest:    ${LATEST_SHA}"
          if [ "${LAST_SHA}" != "${LATEST_SHA}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — skipping build."
          fi

      - name: Trigger Urahara pipeline
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/borninthedark/exousia/actions/workflows/urahara.yml/dispatches" \
            -d '{"ref":"main"}')
          if [ "${HTTP_STATUS}" != "204" ]; then
            echo "ERROR: workflow dispatch returned HTTP ${HTTP_STATUS}" >&2
            exit 1
          fi
          echo "Urahara pipeline triggered (dotfiles changed)."

      - name: Update tracked SHA
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "${{ steps.dotfiles.outputs.latest_sha }}" > .dotfiles-sha
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .dotfiles-sha
          git commit -m "chore: update dotfiles tracking SHA [skip ci]"
          git push
