---
# Nemu Kurotsuchi - 12th Division
# Post-CI housekeeping: generates STATUS.md after the Urahara pipeline
# completes on main. README is managed by the generate-readme pre-commit hook.
#
# 12th Division Pipeline:
#   Urahara  -> Orchestrator
#   Hikifune -> CI: lint + test
#   Uhin     -> Security scanning
#   Hiyori   -> Build, scan, sign, release
#   Nemu     -> Status report

name: "Nemu - Status Report"

on:
  workflow_run:
    workflows: ["Urahara - Orchestrator"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  status-report:
    name: Generate Status Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Fetch workflow run jobs
        id: jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          API_PATH="repos/${{ github.repository }}"
          API_PATH="${API_PATH}/actions/runs/${RUN_ID}/jobs"
          JOBS_JSON=$(gh api "${API_PATH}" --jq '.jobs')

          get_conclusion() {
            echo "${JOBS_JSON}" | jq -r \
              --arg name "$1" \
              '[.[] | select(.name | test($name; "i"))
              ][0].conclusion // "skipped"'
          }

          HIKIFUNE=$(get_conclusion "Hikifune")
          UHIN=$(get_conclusion "Uhin")
          HIYORI=$(get_conclusion "Hiyori")

          echo "hikifune=${HIKIFUNE}" >> "$GITHUB_OUTPUT"
          echo "uhin=${UHIN}" >> "$GITHUB_OUTPUT"
          echo "hiyori=${HIYORI}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Extract build metadata
        id: meta
        run: |
          IMAGE_TYPE=$(grep '^image-type:' adnyeus.yml | awk '{print $2}')
          IMAGE_VERSION=$(grep '^image-version:' adnyeus.yml \
            | awk '{print $2}')
          WM=$(grep 'window_manager:' adnyeus.yml | head -1 | awk '{print $2}')
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          COMMIT_SHA=$(echo "${HEAD_SHA}" | cut -c1-8)
          EVENT="${{ github.event.workflow_run.event }}"

          echo "image_type=${IMAGE_TYPE}" >> "$GITHUB_OUTPUT"
          echo "image_version=${IMAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wm=${WM}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "event=${EVENT}" >> "$GITHUB_OUTPUT"
          SEMVER=$(git describe --tags --abbrev=0 2>/dev/null \
            || echo "unreleased")
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Generate STATUS.md
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HIKIFUNE: ${{ steps.jobs.outputs.hikifune }}
          UHIN: ${{ steps.jobs.outputs.uhin }}
          HIYORI: ${{ steps.jobs.outputs.hiyori }}
          IMAGE_TYPE: ${{ steps.meta.outputs.image_type }}
          IMAGE_VERSION: ${{ steps.meta.outputs.image_version }}
          WM: ${{ steps.meta.outputs.wm }}
          COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          EVENT: ${{ steps.meta.outputs.event }}
          SEMVER: ${{ steps.meta.outputs.semver }}
        run: |
          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M:%S UTC")
          cat > STATUS.md <<EOF
          # Exousia CI Status

          > Last updated: ${TIMESTAMP} | [View Run](${RUN_URL})

          ## Pipeline: Urahara

          | Captain | Division | Role | Status |
          |---------|----------|------|--------|
          | Hikifune | 12th | CI: lint + test | ${HIKIFUNE} |
          | Uhin | 12th | Security scanning | ${UHIN} |
          | Hiyori | 12th | Build & Release | ${HIYORI} |

          **Result:** ${CONCLUSION}

          ## Build

          | Property | Value |
          |----------|-------|
          | Version | \`${SEMVER}\` |
          | Image Type | ${IMAGE_TYPE} |
          | Fedora Version | ${IMAGE_VERSION} |
          | Window Manager | ${WM} |
          | Commit | \`${COMMIT_SHA}\` |
          | Triggered By | ${EVENT} |
          EOF
          sed -i 's/^          //' STATUS.md

      - name: Update CI status
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -am "docs: update CI status [skip ci]" && git push || true
