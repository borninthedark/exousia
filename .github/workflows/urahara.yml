# Kisuke Urahara - 12th Division, Calendula (Despair in Your Heart) - Orchestrator
# Calls Hikifune (CI) + Uhin (Security) in parallel, then Hiyori, then gate.
#
# 12th Division Pipeline:
#   Urahara  -> Orchestrator (12th Division, Calendula -- Despair in Your Heart)
#   Hikifune -> CI: lint + test (12th Division, Calendula -- Despair in Your Heart)
#   Uhin     -> Security scanning (12th Division, Calendula -- Despair in Your Heart)
#   Hiyori   -> Build -> scan + sign -> release (12th Division, Calendula -- Despair in Your Heart)

name: "Urahara - Orchestrator"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "10 0,8,16 * * *"  # Every 8 hours: 00:10, 08:10, 16:10 UTC
  repository_dispatch:
    types: [kernel-artifact-published]
  workflow_dispatch:
    inputs:
      image_type:
        description: "Fedora image type to build"
        required: true
        type: choice
        options:
          - "fedora-sway-atomic"
          - "fedora-bootc"
        default: "fedora-sway-atomic"
      distro_version:
        description: "Fedora version"
        required: true
        type: choice
        options:
          - "43"
          - "44"
          - "rawhide"
        default: "43"
      enable_plymouth:
        description: "Enable Plymouth boot splash"
        required: true
        type: boolean
        default: true
      kernel_profile:
        description: "Kernel profile"
        required: false
        type: choice
        options:
          - "default"
          - "mainline"
          - "stable"
          - "longterm"
          - "next"
          - "cachyos"
        default: "default"
      enable_zfs:
        description: "Enable ZFS kernel module"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # -- Read default version from blueprint so we don't hardcode it --
  defaults:
    name: "Resolve Defaults"
    runs-on: ubuntu-latest
    outputs:
      distro_version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: adnyeus.yml
          sparse-checkout-cone-mode: false
      - name: Read image-version from blueprint
        id: read
        run: |
          VERSION=$(grep '^image-version:' adnyeus.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Blueprint default version: ${VERSION}"

  # -- Hikifune (CI) + Uhin (Security) run in parallel --
  hikifune:
    name: "Hikifune (CI)"
    uses: ./.github/workflows/hikifune.yml
    secrets: inherit
    permissions:
      contents: read

  uhin:
    name: "Uhin (Security)"
    uses: ./.github/workflows/uhin.yml
    permissions:
      contents: read

  # -- Hiyori (Build) runs after both pass --
  hiyori:
    name: "Hiyori (Build)"
    needs: [defaults, hikifune, uhin]
    uses: ./.github/workflows/hiyori.yml
    with:
      image_type: ${{ inputs.image_type || 'fedora-sway-atomic' }}
      distro_version: ${{ github.event.client_payload.fedora_version || inputs.distro_version || needs.defaults.outputs.distro_version }}
      enable_plymouth: ${{ inputs.enable_plymouth == '' && true || inputs.enable_plymouth }}
      kernel_profile: ${{ github.event.client_payload.kernel_source || inputs.kernel_profile || 'default' }}
      enable_zfs: ${{ github.event.client_payload.enable_zfs == 'true' || inputs.enable_zfs == 'true' }}
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write

  # -- Gate: summary of all jobs --
  gate:
    name: "Gate (Summary)"
    needs: [hikifune, uhin, hiyori]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "## Urahara Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hikifune (CI) | ${{ needs.hikifune.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Uhin (Security) | ${{ needs.uhin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hiyori (Build) | ${{ needs.hiyori.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: >-
          needs.hikifune.result == 'failure' ||
          needs.uhin.result == 'failure' ||
          needs.hiyori.result == 'failure'
        run: exit 1
