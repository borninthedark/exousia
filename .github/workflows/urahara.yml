# Kisuke Urahara - 12th Division - Orchestrator
# Calls Hikifune (CI) + Uhin (Security) in parallel, then Hiyori, then gate.
#
# 12th Division Pipeline:
#   Urahara  -> Orchestrator
#   Hikifune -> CI: lint + test
#   Uhin     -> Security scanning
#   Hiyori   -> Build -> scan + sign -> release
#
# Matrix builds: push/schedule build all target versions in parallel.
# workflow_dispatch builds the single selected version.

name: "Urahara - Orchestrator"

on:
  push:
    branches: [main, "uryu/*"]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "*.md"
      - "LICENSE"
      - ".pre-commit-config.yaml"
      - "tools/generate-readme.py"
      - "tools/test_*.py"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "*.md"
      - "LICENSE"
      - ".pre-commit-config.yaml"
      - "tools/generate-readme.py"
      - "tools/test_*.py"
  schedule:
    - cron: "10 0,12 * * *"  # Every 12 hours: 00:10, 12:10 UTC
  workflow_dispatch:
    inputs:
      image_types:
        description: "Image types to build (comma-separated, e.g. fedora-sway-atomic or fedora-sway-atomic,fedora-bootc)"
        required: false
        type: string
        default: "fedora-sway-atomic"
      distro_versions:
        description: "Fedora versions to build (comma-separated, e.g. 44 or 43,44). Leave empty to use blueprint default."
        required: false
        type: string
        default: ""
      enable_plymouth:
        description: "Enable Plymouth boot splash"
        required: true
        type: boolean
        default: true
      enable_sealed:
        description: "Build sealed boot image (requires SB key secrets)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

jobs:
  # -- Muramasa (Zanpakutō) — Resolve build defaults and version matrix --
  muramasa:
    name: "Muramasa (Defaults)"
    runs-on: ubuntu-latest
    outputs:
      primary_version: ${{ steps.read.outputs.version }}
      versions: ${{ steps.matrix.outputs.versions }}
      image_types: ${{ steps.matrix.outputs.image_types }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: adnyeus.yml
          sparse-checkout-cone-mode: false

      - name: Read image-version from blueprint
        id: read
        run: |
          VERSION=$(grep '^image-version:' adnyeus.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Blueprint primary version: ${VERSION}"

      - name: Build matrix
        id: matrix
        run: |
          # Resolve version matrix
          VER_INPUT="${{ inputs.distro_versions }}"
          if [[ -z "$VER_INPUT" ]]; then
            VER_INPUT="${{ steps.read.outputs.version }}"
          fi
          VER_JSON=$(echo "$VER_INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
          echo "versions=${VER_JSON}" >> $GITHUB_OUTPUT
          echo "Version matrix: ${VER_JSON}"

          # Resolve image type matrix
          TYPE_INPUT="${{ inputs.image_types }}"
          if [[ -z "$TYPE_INPUT" ]]; then
            TYPE_INPUT="fedora-sway-atomic"
          fi
          TYPE_JSON=$(echo "$TYPE_INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
          echo "image_types=${TYPE_JSON}" >> $GITHUB_OUTPUT
          echo "Image type matrix: ${TYPE_JSON}"

  # -- Hikifune (CI) + Uhin (Security) run in parallel --
  hikifune:
    name: "Hikifune (CI)"
    uses: ./.github/workflows/hikifune.yml
    secrets: inherit
    permissions:
      contents: read

  uhin:
    name: "Uhin (Security)"
    uses: ./.github/workflows/uhin.yml
    permissions:
      contents: read

  # -- Hiyori (Build) runs after both pass, once per version --
  hiyori:
    name: "Hiyori (${{ matrix.image_type }}/f${{ matrix.distro_version }})"
    needs: [muramasa, hikifune, uhin]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
    strategy:
      fail-fast: false
      matrix:
        distro_version: ${{ fromJSON(needs.muramasa.outputs.versions) }}
        image_type: ${{ fromJSON(needs.muramasa.outputs.image_types) }}
    uses: ./.github/workflows/hiyori.yml
    with:
      image_type: ${{ matrix.image_type }}
      distro_version: ${{ matrix.distro_version }}
      enable_plymouth: ${{ inputs.enable_plymouth == '' && true || inputs.enable_plymouth }}
      is_primary: ${{ matrix.distro_version == needs.muramasa.outputs.primary_version && matrix.image_type == 'fedora-sway-atomic' }}
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write

  # -- Ulquiorra (Sealed Boot, optional, after Hiyori) --
  ulquiorra:
    name: "Ulquiorra (f${{ matrix.distro_version }})"
    needs: [muramasa, hiyori]
    if: >-
      inputs.enable_sealed == true &&
      github.event_name != 'pull_request' &&
      contains(needs.muramasa.outputs.image_types, 'fedora-bootc')
    strategy:
      fail-fast: false
      matrix:
        distro_version: ${{ fromJSON(needs.muramasa.outputs.versions) }}
    uses: ./.github/workflows/ulquiorra.yml
    with:
      base_image: ghcr.io/borninthedark/exousia:bootc-f${{ matrix.distro_version }}
      distro_version: ${{ matrix.distro_version }}
      is_primary: ${{ matrix.distro_version == needs.muramasa.outputs.primary_version }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  # -- Gate: summary of all jobs --
  gate:
    name: "Gate (Summary)"
    needs: [hikifune, uhin, hiyori, ulquiorra]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "## Urahara Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hikifune (CI) | ${{ needs.hikifune.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Uhin (Security) | ${{ needs.uhin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hiyori (Build) | ${{ needs.hiyori.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ulquiorra (Sealed Boot) | ${{ needs.ulquiorra.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: >-
          needs.hikifune.result == 'failure' ||
          needs.uhin.result == 'failure' ||
          needs.hiyori.result == 'failure' ||
          (needs.ulquiorra.result == 'failure')
        run: exit 1

      - name: Checkout (for gh CLI)
        if: >-
          github.ref != 'refs/heads/main' &&
          github.event_name == 'push'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create promotion PR (feature branch)
        if: >-
          github.ref != 'refs/heads/main' &&
          github.event_name == 'push' &&
          needs.hikifune.result == 'success' &&
          needs.uhin.result == 'success' &&
          (needs.hiyori.result == 'success' || needs.hiyori.result == 'skipped')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')

          # Build commit log since last merge to main
          COMMITS=$(git log origin/main..HEAD --pretty=format:'- %h %s' 2>/dev/null | head -20)

          PR_TITLE="promote(${SHORT_SHA}): ${COMMIT_MSG}"

          PR_BODY=$(cat <<'HEREDOC'
          ## Promotion PR

          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Triggered by:** ${{ github.actor }}

          ### Pipeline Results

          | Check | Result |
          |-------|--------|
          | Hikifune (CI) | ${{ needs.hikifune.result }} |
          | Uhin (Security) | ${{ needs.uhin.result }} |
          | Hiyori (Build) | ${{ needs.hiyori.result }} |
          | Ulquiorra (Sealed Boot) | ${{ needs.ulquiorra.result }} |

          ### Commits
          HEREDOC
          )
          PR_BODY="${PR_BODY}
          ${COMMITS}

          ---
          *Created by Urahara pipeline*"

          EXISTING=$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number // empty')

          if [ -n "${EXISTING}" ]; then
            gh pr edit "${EXISTING}" --title "${PR_TITLE}" --body "${PR_BODY}"
            echo "Updated existing promotion PR #${EXISTING} for ${BRANCH}"
          else
            gh pr create \
              --title "${PR_TITLE}" \
              --base main \
              --head "${BRANCH}" \
              --body "${PR_BODY}"
            echo "Created promotion PR: ${BRANCH} -> main"
          fi
