# Kisuke Urahara - 12th Division - Orchestrator
# Calls Hikifune (CI) + Uhin (Security) in parallel, then Hiyori, then gate.
#
# 12th Division Pipeline:
#   Urahara  -> Orchestrator
#   Hikifune -> CI: lint + test
#   Uhin     -> Security scanning
#   Hiyori   -> Build -> scan + sign -> release
#
# Matrix builds: push/schedule build all target versions in parallel.
# workflow_dispatch builds the single selected version.

name: "Urahara - Orchestrator"

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "*.md"
      - "LICENSE"
      - ".pre-commit-config.yaml"
      - "tools/generate-readme.py"
      - "tools/test_*.py"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "*.md"
      - "LICENSE"
      - ".pre-commit-config.yaml"
      - "tools/generate-readme.py"
      - "tools/test_*.py"
  schedule:
    - cron: "10 0,12 * * *"  # Every 12 hours: 00:10, 12:10 UTC
  workflow_dispatch:
    inputs:
      image_type:
        description: "Fedora image type to build"
        required: true
        type: choice
        options:
          - "fedora-sway-atomic"
          - "fedora-bootc"
        default: "fedora-sway-atomic"
      distro_versions:
        description: "Fedora versions to build (comma-separated, e.g. 44 or 44,rawhide). Leave empty to use blueprint default."
        required: false
        type: string
        default: ""
      enable_plymouth:
        description: "Enable Plymouth boot splash"
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # -- Read defaults and build version matrix --
  defaults:
    name: "Resolve Defaults"
    runs-on: ubuntu-latest
    outputs:
      primary_version: ${{ steps.read.outputs.version }}
      versions: ${{ steps.matrix.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: adnyeus.yml
          sparse-checkout-cone-mode: false

      - name: Read image-version from blueprint
        id: read
        run: |
          VERSION=$(grep '^image-version:' adnyeus.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Blueprint primary version: ${VERSION}"

      - name: Build version matrix
        id: matrix
        run: |
          INPUT="${{ inputs.distro_versions }}"
          if [[ -z "$INPUT" ]]; then
            # No override — use blueprint default
            INPUT="${{ steps.read.outputs.version }}"
          fi
          JSON=$(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | jq -R . | jq -sc .)
          echo "versions=${JSON}" >> $GITHUB_OUTPUT
          echo "Matrix: ${JSON}"

  # -- Hikifune (CI) + Uhin (Security) run in parallel --
  hikifune:
    name: "Hikifune (CI)"
    uses: ./.github/workflows/hikifune.yml
    secrets: inherit
    permissions:
      contents: read

  uhin:
    name: "Uhin (Security)"
    uses: ./.github/workflows/uhin.yml
    permissions:
      contents: read

  # -- Hiyori (Build) runs after both pass, once per version --
  hiyori:
    name: "Hiyori (f${{ matrix.distro_version }})"
    needs: [defaults, hikifune, uhin]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork != true
    strategy:
      fail-fast: false
      matrix:
        distro_version: ${{ fromJSON(needs.defaults.outputs.versions) }}
    uses: ./.github/workflows/hiyori.yml
    with:
      image_type: ${{ inputs.image_type || 'fedora-sway-atomic' }}
      distro_version: ${{ matrix.distro_version }}
      enable_plymouth: ${{ inputs.enable_plymouth == '' && true || inputs.enable_plymouth }}
      is_primary: ${{ matrix.distro_version == needs.defaults.outputs.primary_version }}
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write

  # -- Gate: summary of all jobs --
  gate:
    name: "Gate (Summary)"
    needs: [hikifune, uhin, hiyori]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "## Urahara Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hikifune (CI) | ${{ needs.hikifune.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Uhin (Security) | ${{ needs.uhin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hiyori (Build) | ${{ needs.hiyori.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: >-
          needs.hikifune.result == 'failure' ||
          needs.uhin.result == 'failure' ||
          needs.hiyori.result == 'failure'
        run: exit 1
