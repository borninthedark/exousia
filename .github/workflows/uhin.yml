# Uhin Zenjoji - 12th Division
# Validates file structure, generates Containerfile, runs Hadolint + Checkov +
# Trivy config scan + Bandit, then uploads the generated Containerfile for Hiyori.

name: "Uhin - Security"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  security-scan:
    name: Security & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bats
        id: setup-bats
        uses: bats-core/bats-action@5b1e60c2ee94cb1b44a616ea4b1f466f9d6e38ef # 4.0.0
        with:
          github-token: ${{ github.token }}

      - name: Verify required file structure
        run: |
          echo "## Uhin: File Structure Check" >> $GITHUB_STEP_SUMMARY

          for file in sway.desktop start-sway; do
            if [[ ! -f "overlays/sway/session/$file" ]]; then
              echo "ERROR: Missing overlays/sway/session/$file"
              exit 1
            fi
          done

          if [[ ! -f "overlays/sway/configs/greetd/config.toml" ]]; then
            echo "ERROR: Missing overlays/sway/configs/greetd/config.toml"
            exit 1
          fi

          for dir in window-managers common; do
            if [[ ! -d "overlays/base/packages/$dir" ]]; then
              echo "ERROR: Missing overlays/base/packages/$dir directory"
              exit 1
            fi
          done

          for script in setup-plymouth-theme dracut-rebuild ensure-sway-session; do
            if [[ ! -f "overlays/sway/scripts/setup/$script" ]]; then
              echo "ERROR: Missing overlays/sway/scripts/setup/$script"
              exit 1
            fi
          done

          for script in layered-include volume-helper; do
            if [[ ! -f "overlays/sway/scripts/runtime/$script" ]]; then
              echo "ERROR: Missing overlays/sway/scripts/runtime/$script"
              exit 1
            fi
          done

          echo "All required files present" >> $GITHUB_STEP_SUMMARY

      - name: Run overlay Bats tests
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: bats tests/overlay_content.bats

      - name: Transpile YAML blueprint
        id: transpile
        uses: ./.github/actions/transpile

      - name: Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile.generated
          ignore: DL3041,DL3059,DL4006,SC3040

      - name: Upload generated Containerfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: containerfile-generated
          path: Dockerfile.generated
          retention-days: 1

      - name: Checkov (Containerfile)
        uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32 # v12
        with:
          file: Dockerfile.generated
          framework: dockerfile
          quiet: true
          soft_fail: true
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Bandit (Python SAST)
        run: uv run bandit -r tools/ -ll -c pyproject.toml

      - name: Install OSV-Scanner
        run: |
          set -euxo pipefail
          OSV_VERSION="2.3.6"
          OSV_SHA256="f689e183ef0d573d2459738aae457d411a26241ae58b5088de1af288b3355604"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          echo "${OSV_SHA256}  /usr/local/bin/osv-scanner" | sha256sum --check --strict
          chmod +x /usr/local/bin/osv-scanner

      - name: OSV-Scanner
        run: |
          set -euxo pipefail
          osv-scanner scan source --recursive ./

      - name: Security summary
        if: always()
        run: |
          echo "## Uhin: Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hadolint | Containerfile |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | Containerfile |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | Repository config |" >> $GITHUB_STEP_SUMMARY
          echo "| Bandit | Python tools/ |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV-Scanner | Dependencies |" >> $GITHUB_STEP_SUMMARY
