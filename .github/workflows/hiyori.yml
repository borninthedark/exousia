# Hiyori Sarugaki - 12th Division - Build, Sign & Release
# Builds image, scans with Trivy, signs with cosign (OIDC keyless),
# and cuts semver releases from conventional commits.
name: "Hiyori - Build & Release"

on:
  workflow_call:
    inputs:
      image_type:
        description: "Fedora image type to build"
        type: string
        default: "fedora-sway-atomic"
      distro_version:
        description: "Fedora version (passed from Urahara, sourced from blueprint)"
        type: string
        required: true
      enable_plymouth:
        description: "Enable Plymouth boot splash"
        type: boolean
        default: true

env:
  REGISTRY_URL: ghcr.io

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build Bootc Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      image_digest: ${{ steps.build-push.outputs.digest }}
      image_ref: ${{ steps.image.outputs.image }}
      build_type: ${{ steps.config.outputs.build_image_type }}
      enable_plymouth: ${{ steps.config.outputs.enable_plymouth }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Transpile YAML blueprint
        id: config
        uses: ./.github/actions/transpile
        with:
          image_type: ${{ inputs.image_type }}
          distro_version: ${{ inputs.distro_version }}
          enable_plymouth: ${{ inputs.enable_plymouth }}

      - name: Verify build environment
        run: |
          BUILDAH_VERSION=$(buildah --version | awk '{print $3}') || echo "buildah not found"
          if [ -n "$BUILDAH_VERSION" ] && [ "$BUILDAH_VERSION" != "not" ]; then
            REQUIRED_VERSION="1.14.5"
            if [ "$(printf '%s\n' "$REQUIRED_VERSION" "$BUILDAH_VERSION" | sort -V | head -n1)" != "$REQUIRED_VERSION" ]; then
              echo "ERROR: buildah version $BUILDAH_VERSION is below the required $REQUIRED_VERSION"
              exit 1
            fi
          fi

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TAG="${{ steps.config.outputs.build_image_type }}-${SHORT_SHA}"
          BRANCH="${GITHUB_REF_NAME//\//-}"
          ROLLING=$([[ "${{ github.event_name }}" == "schedule" ]] && echo "true" || echo "false")
          ROLLING_TAG="rolling-$(date -u +%Y%m%d-%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "rolling=$ROLLING" >> $GITHUB_OUTPUT
          echo "rolling_tag=$ROLLING_TAG" >> $GITHUB_OUTPUT

      - name: Resolve image repository
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY_URL }}/${OWNER}/${REPO}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: image=moby/buildkit:v0.28.1  # Remediate CVE-2026-33747 (path traversal)

      - name: Login to GHCR for RPM overrides
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ steps.config.outputs.containerfile }}
          push: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.tag.outputs.tag }}
            ${{ steps.image.outputs.image }}:${{ steps.tag.outputs.branch }}
            ${{ steps.tag.outputs.rolling == 'true' && format('{0}:{1}', steps.image.outputs.image, steps.tag.outputs.rolling_tag) || '' }}
            ${{ steps.tag.outputs.rolling == 'true' && format('{0}:current', steps.image.outputs.image) || '' }}
            ${{ steps.image.outputs.image }}:latest
          build-args: |
            FEDORA_VERSION=${{ steps.config.outputs.build_version }}
            IMAGE_TYPE=${{ steps.config.outputs.build_image_type }}
            ENABLE_PLYMOUTH=${{ steps.config.outputs.enable_plymouth }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        if: always()
        run: |
          echo "## Hiyori: Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.image.outputs.image }}:${{ steps.tag.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ steps.config.outputs.build_image_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Plymouth | ${{ steps.config.outputs.enable_plymouth }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build-push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

  # -- Scan + Sign run in parallel after build --
  scan:
    name: Trivy Image Scan
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 15
    env:
      TRIVY_PASSWORD: ${{ secrets.GHCR_PAT }}
      TRIVY_USERNAME: ${{ github.repository_owner }}
    steps:
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ needs.build.outputs.image_ref }}:${{ needs.build.outputs.image_tag }}
          format: table
          output: trivy-results.txt
          hide-progress: true
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Generate SBOM and submit to GitHub Dependency Graph
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: ${{ needs.build.outputs.image_ref }}:${{ needs.build.outputs.image_tag }}
          format: github
          output: dependency-results.sbom.json
          github-pat: ${{ github.token }}
          scanners: vuln
          skip-setup-trivy: true

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-scan-${{ needs.build.outputs.image_tag }}
          path: trivy-results.txt
          retention-days: 14

      - name: Upload SBOM artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sbom-${{ needs.build.outputs.image_tag }}
          path: dependency-results.sbom.json
          retention-days: 14

      - name: Publish Trivy report to summary
        if: always()
        run: |
          echo "## Hiyori: Trivy Image Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ needs.build.outputs.image_ref }}:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: \`trivy-image-scan-${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "- SBOM: submitted to GitHub Dependency Graph and uploaded as \`trivy-sbom-${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -s trivy-results.txt ]]; then
            {
              echo ""
              echo "<details><summary>Trivy report</summary>"
              echo ""
              echo '```text'
              cat trivy-results.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

  sign:
    name: Cosign Image
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}
      - name: Sign image with cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - run: |
          cosign sign --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --oidc-client-id=sigstore \
            "${{ needs.build.outputs.image_ref }}@${{ needs.build.outputs.image_digest }}"

  # -- Release runs after scan + sign --
  release:
    name: Semantic Release
    needs: [build, scan, sign]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:"; then
            PATCH=$((PATCH + 1))
          else
            echo "No conventional commits found - skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Login to GHCR
        if: steps.version.outputs.skip != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Retag image with semver and update latest
        if: steps.version.outputs.skip != 'true'
        id: retag
        run: |
          IMAGE="${{ needs.build.outputs.image_ref }}"
          VERSION="${{ steps.version.outputs.version }}"

          docker pull "${IMAGE}:${{ needs.build.outputs.image_tag }}"
          docker tag "${IMAGE}:${{ needs.build.outputs.image_tag }}" "${IMAGE}:${VERSION}"
          docker tag "${IMAGE}:${{ needs.build.outputs.image_tag }}" "${IMAGE}:latest"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${VERSION}" | cut -d@ -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign release image with cosign
        if: steps.version.outputs.skip != 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - if: steps.version.outputs.skip != 'true'
        run: |
          cosign sign --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --oidc-client-id=sigstore \
            "${{ needs.build.outputs.image_ref }}@${{ steps.retag.outputs.digest }}"

      - name: Create tag and release
        if: steps.version.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --generate-notes

      - name: Release summary
        if: always()
        run: |
          echo "## Hiyori: Release Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.version.outputs.skip }}" == "true" ]]; then
            echo "No release needed (no conventional commits)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Released **${{ steps.version.outputs.version }}**" >> $GITHUB_STEP_SUMMARY
            echo "Image: \`${{ needs.build.outputs.image_ref }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          fi
